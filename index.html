<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio GitHub</title>
    <style>
        /* Estilos Globais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Cartão Principal */
        .profile-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        /* Foto de Perfil (Substitua a URL se quiser) */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #238636;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 24px;
            color: #f0f6fc;
            margin-bottom: 5px;
        }

        p {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 20px;
        }

        /* Botão */
        .btn {
            display: inline-block;
            background-color: #238636;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #2ea043;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <!-- Imagem padrão do GitHub. Substitua pelo seu usuário se quiser -->
        <img src="https://github.com" alt="Foto de Perfil" class="avatar">
        
        <h1>Bem-vindo ao Meu Site</h1>
        <p>Este é o meu projeto inicial hospedado diretamente no GitHub Pages de forma estática.</p>
        
        <a href="https://github.com" target="_blank" class="btn">Ver meu GitHub</a>
    </div>

</body>
</html>
